<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Coin background -->
  <circle cx="16" cy="16" r="15" fill="#0a1a0c" stroke="#9bfd4e" stroke-width="1.5"/>
  <!-- Coin inner ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#9bfd4e" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- ETH diamond shape -->
  <!-- Upper left -->
  <polygon points="16,5 10,16 16,14" fill="#9bfd4e" opacity="0.75"/>
  <!-- Upper right -->
  <polygon points="16,5 22,16 16,14" fill="#9bfd4e"/>
  <!-- Lower left -->
  <polygon points="10,17.5 16,27 16,21" fill="#9bfd4e" opacity="0.75"/>
  <!-- Lower right -->
  <polygon points="22,17.5 16,27 16,21" fill="#9bfd4e"/>
  <!-- Center left -->
  <polygon points="10,16 16,14 16,21 10,17.5" fill="#9bfd4e" opacity="0.45"/>
  <!-- Center right -->
  <polygon points="22,16 16,14 16,21 22,17.5" fill="#9bfd4e" opacity="0.65"/>
</svg>
